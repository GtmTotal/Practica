@if (formGroup()) {
  <form [formGroup]="formGroup()!" class="main-wrapper">
    <app-header-form
      [centro]="centro()"
      [progreso]="progreso()"
      [formGroup]="formGroup()!"
      [onCerrar]="onCerrar()"
    />

    <app-lista-secciones
      [seccionesGroups]="seccionesGroups()"
      [seccionesColapsadas]="seccionesColapsadas()"
      [fotosPorSeccionBase64]="fotosPorSeccionBase64()"
      (toggle)="toggleSeccion.emit($event)"
      (agregarFoto)="agregarFoto.emit($event)"
      (eliminarFoto)="eliminarFoto.emit($event)"
      (descargarFoto)="descargarFoto.emit($event)"
      (actualizarDescripcion)="actualizarDescripcion.emit($event)">
    </app-lista-secciones>

    <app-informe-footer
      [formGroup]="formGroup()!"
      [guardando]="guardando()"
      (guardarYSalir)="guardarYSalir.emit()"
      (generarPDF)="generarPDF.emit()">
    </app-informe-footer>
  </form>
}
