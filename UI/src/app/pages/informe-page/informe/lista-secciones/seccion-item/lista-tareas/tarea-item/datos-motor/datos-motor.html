<div class="bombas-container">
  @for (bombaGroup of bombasGroups; track $index) {
    <div [formGroup]="bombaGroup" class="bomba-item">
      <span class="bomba-nombre">{{ bombaGroup.get('nombre')?.value }}</span>
      <div class="bomba-campos">
        @for (campo of getCamposBomba(bombaGroup); track campo.clave) {
          <label class="campo-bomba">
            <span>{{ campo.sufijo }}</span>
            <input type="number" step="any" [formControlName]="campo.clave" [placeholder]="campo.sufijo">
          </label>
        }
      </div>
    </div>
  }
</div>
