<div class="card-informe">
  <div>
    <strong>
      {{ informe().nombreObra }}
      @if ((informe().progreso ?? 0) > 0) {
        <div class="mini-progreso-container">
          <div class="mini-progreso-bar" [style.width.%]="informe().progreso"></div>
          <span class="mini-progreso-texto">{{ informe().progreso }}%</span>
        </div>
      }
    </strong>
    <br />
    <small>💾 {{ informe().ultimaModificacion }}</small>
  </div>
  <button class="btn-editar" (click)="editar.emit(informe())">Editar</button>
</div>
