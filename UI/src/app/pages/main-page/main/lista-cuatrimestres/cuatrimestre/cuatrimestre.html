<div class="cuatrimestre-wrapper">
  <div class="cuatrimestre-row" (click)="toggle.emit(grupo().clave)">
    <div class="cuatrimestre-info">
      <span class="cuatrimestre-name">
        {{ grupo().label.includes(' - ') ? (grupo().label.split(' - ')[0]) : grupo().label }}
      </span>
      <span class="cuatrimestre-year">
        {{ grupo().label.includes(' - ') ? (grupo().label.split(' - ')[1]) : '' }}
      </span>
    </div>
    <div class="cuatrimestre-meta">
      <span>{{ grupo().informes.length }} centros</span>
      <span class="arrow">{{ colapsado() ? '→' : '↓' }}</span>
    </div>
  </div>

  @if (!colapsado()) {
    <div class="centros-panel">
      <app-lista-informes [informes]="grupo().informes" (editar)="editarInforme.emit($event)"></app-lista-informes>
    </div>
  }
</div>
