<div class="admin-container">
  <div class="admin-header-main">
    <h2>Administración</h2>
    <button class="btn-logout" (click)="cerrarSesion()" title="Cerrar sesión admin">
      <span class="logout-icon">🔒</span>
      <span class="logout-text">Salir</span>
    </button>
  </div>

  <div class="admin-panel animate-fade-in">
    <div class="admin-header">
      <h3>Panel de Control</h3>
      <span class="badge-admin">Modo Edición</span>
    </div>
    
    <div class="admin-description">
      Gestiona los datos base de la aplicación y la estructura de los cuatrimestres.
    </div>

    <div class="admin-actions">
      <input type="file" #excelInput accept=".xlsx" hidden (change)="onSubirExcel($event)" />
      <button class="btn-admin-action sync" (click)="excelInput.click()" [disabled]="isSyncing()">
        {{ isSyncing() ? '⏳ Sincronizando...' : '📤 Subir Excel' }}
      </button>
      <button class="btn-admin-action create" (click)="crearCuatrimestre()">
        📅 Crear Cuatrimestre
      </button>
    </div>
  </div>

  <div class="admin-list-section">
    <h3>Gestión de Cuatrimestres</h3>
    @if (informesGuardados().length === 0) {
    <div class="no-drafts">No hay cuatrimestres ni borradores registrados.</div>
    } @else {
    <app-lista-cuatrimestres [grupos]="informesPorCuatrimestre" [isAdmin]="true"
      (eliminarCuatrimestre)="eliminarCuatrimestre($event)" (editarInforme)="editarInforme($event)">
    </app-lista-cuatrimestres>
    }
  </div>
</div>
