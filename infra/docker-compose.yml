version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: reporte_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-reporte_obras}
      POSTGRES_USER: ${DB_USER:-appuser}
      POSTGRES_PASSWORD: ${DB_PASS:-apppass}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - reporte_net

  minio:
    image: minio/minio:latest
    container_name: reporte_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - reporte_net

  api:
    build:
      context: ..
      dockerfile: apiService/Dockerfile
    container_name: reporte_api
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=${DB_HOST:-postgres};Port=${DB_PORT:-5432};Database=${DB_NAME:-reporte_obras};Username=${DB_USER:-appuser};Password=${DB_PASS:-apppass}
      - Storage__ServiceUrl=${STORAGE_URL:-http://minio:9000}
      - Storage__AccessKey=${STORAGE_ACCESS_KEY:-minioadmin}
      - Storage__SecretKey=${STORAGE_SECRET_KEY:-minioadmin}
      - Storage__BucketName=${STORAGE_BUCKET:-obras}
      - Admin__Password=${ADMIN_PASSWORD:-1234}
      - Admin__TokenSecret=${ADMIN_TOKEN_SECRET}
      - Admin__TokenExpirationHours=${ADMIN_TOKEN_EXPIRATION_HOURS:-8}
    depends_on:
      - postgres
      - minio
    networks:
      - reporte_net

  ui:
    build:
      context: ../UI
      dockerfile: Dockerfile
    container_name: reporte_ui
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - reporte_net

volumes:
  pg_data:
  minio_data:

networks:
  reporte_net:
    driver: bridge