version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: reporte_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: reporte_obras
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - reporte_net

  minio:
    image: minio/minio:latest
    container_name: reporte_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - reporte_net

  api:
    build:
      context: ..
      dockerfile: apiService/Dockerfile
    container_name: reporte_api
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=reporte_obras;Username=appuser;Password=apppass
      - Minio__Endpoint=minio:9000
      - Minio__AccessKey=minioadmin
      - Minio__SecretKey=minioadmin
    depends_on:
      - postgres
      - minio
    networks:
      - reporte_net

  ui:
    build:
      context: ../UI
      dockerfile: Dockerfile
    container_name: reporte_ui
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - reporte_net

volumes:
  pg_data:
  minio_data:

networks:
  reporte_net:
    driver: bridge